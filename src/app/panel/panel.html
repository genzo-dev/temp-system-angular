    (click)="esfriar()"
    class="bg-blue-300 border rounded px-4 py-2 text-lg md:text-2xl hover:cursor-pointer hover:bg-blue-500 transition"
  >
    Esfriar (-10)°C
  </button>
  <button
    (click)="aquecer()"
    class="bg-red-300 border rounded px-4 py-2 text-lg md:text-2xl hover:cursor-pointer hover:bg-red-500 transition"
  >
    Aquecer (+10)°C
  </button>
</div>
